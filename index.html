<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SADIXLL SAVER — Скачай любое видео</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c1a 0%, #1a142f 50%, #0d0b1a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированные листья */
        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 22px;
            opacity: 0.3;
            animation: floatLeaf linear infinite;
        }

        @keyframes floatLeaf {
            0% {
                transform: translateY(-10vh) translateX(-10vw) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(110vh) translateX(20vw) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            font-size: 70px;
            margin-bottom: 20px;
            animation: pulseGlow 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493; }
            50% { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493, 0 0 60px #ff69b4; }
        }

        h1 {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff69b4, #ff1493, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
        }

        .badge {
            display: inline-block;
            background: rgba(255,105,180,0.2);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 15px;
            color: #ff69b4;
        }

        .input-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,105,180,0.3);
            transition: all 0.3s;
        }

        .url-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            padding: 18px 24px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,105,180,0.3);
            border-radius: 50px;
            font-size: 16px;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .url-input:focus {
            border-color: #ff69b4;
        }

        .url-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .process-btn {
            padding: 18px 32px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .process-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(255,105,180,0.4);
        }

        .platforms {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .platform-badge {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.3s;
        }

        .platform-badge:hover {
            background: rgba(255,105,180,0.3);
            transform: translateY(-2px);
        }

        .platform-badge i {
            margin-right: 8px;
            color: #ff69b4;
        }

        .result-card {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,105,180,0.3);
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .result-card.show {
            display: block;
        }

        .video-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .video-thumb {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            object-fit: cover;
            background: rgba(0,0,0,0.5);
        }

        .video-details {
            flex: 1;
        }

        .video-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .video-meta {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 15px;
        }

        .quality-select {
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,105,180,0.3);
            border-radius: 40px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            outline: none;
        }

        .get-link-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .get-link-btn:hover {
            transform: scale(1.02);
        }

        .direct-link {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .direct-link input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,105,180,0.3);
            border-radius: 40px;
            color: white;
            outline: none;
            font-size: 12px;
        }

        .copy-btn {
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,105,180,0.3);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: rgba(255,105,180,0.3);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .loader.show {
            display: block;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,105,180,0.3);
            border-top-color: #ff69b4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: rgba(255,255,255,0.7);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 100;
            animation: fadeInUp 0.3s ease;
            display: none;
            white-space: nowrap;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .logo { font-size: 50px; }
            .url-input-group { flex-direction: column; }
            .process-btn { justify-content: center; }
            .video-info { flex-direction: column; align-items: center; text-align: center; }
            .toast { white-space: normal; text-align: center; max-width: 80%; }
        }
    </style>
</head>
<body>

    <div id="bgAnimation"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-download"></i>
            </div>
            <h1>SADIXLL SAVER</h1>
            <div class="subtitle">
                <i class="fas fa-infinity"></i> Скачай ЛЮБОЕ видео — YouTube, Instagram, TikTok <i class="fas fa-infinity"></i>
            </div>
            <div class="badge">
                <i class="fas fa-crown"></i> 8K/4K | MP3 320kbps | Без рекламы
            </div>
        </div>

        <div class="input-card">
            <div class="url-input-group">
                <input type="text" class="url-input" id="urlInput" placeholder="Вставь ссылку на видео (YouTube, Instagram, TikTok, Twitter...)">
                <button class="process-btn" id="processBtn">
                    <i class="fas fa-magic"></i> Получить ссылку
                </button>
            </div>
            <div class="platforms">
                <div class="platform-badge" data-url="https://youtu.be/"><i class="fab fa-youtube"></i> YouTube</div>
                <div class="platform-badge" data-url="https://www.instagram.com/reel/"><i class="fab fa-instagram"></i> Instagram</div>
                <div class="platform-badge" data-url="https://www.tiktok.com/"><i class="fab fa-tiktok"></i> TikTok</div>
                <div class="platform-badge" data-url="https://twitter.com/"><i class="fab fa-twitter"></i> Twitter/X</div>
                <div class="platform-badge" data-url="https://www.facebook.com/"><i class="fab fa-facebook"></i> Facebook</div>
                <div class="platform-badge" data-url="https://vk.com/"><i class="fab fa-vk"></i> VK</div>
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="loader-spinner"></div>
            <div class="loader-text">Обработка ссылки... <i class="fas fa-heart" style="color:#ff69b4"></i></div>
        </div>

        <div class="result-card" id="resultCard">
            <div class="video-info">
                <img class="video-thumb" id="thumbImg" src="" alt="thumbnail">
                <div class="video-details">
                    <div class="video-title" id="titleText">Название видео</div>
                    <div class="video-meta" id="metaText"></div>
                    <div>
                        <select class="quality-select" id="qualitySelect">
                            <option value="highest">🎬 Максимальное качество (8K/4K/1080p)</option>
                            <option value="720p">📱 HD 720p</option>
                            <option value="480p">📱 SD 480p</option>
                            <option value="audio">🎵 Только аудио (MP3)</option>
                        </select>
                        <button class="get-link-btn" id="downloadBtn">
                            <i class="fas fa-download"></i> Скачать
                        </button>
                    </div>
                </div>
            </div>
            <div class="direct-link">
                <input type="text" id="linkInput" readonly placeholder="Ссылка для скачивания появится здесь">
                <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Копировать</button>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-shield-alt"></i> Работает со всеми платформами | Без потери качества
            <br>
            <i class="fas fa-heart" style="color:#ff69b4"></i> SADIXLL SAVER — Created by Saidjan TJK 🇹🇯
        </div>
    </div>

    <div class="toast" id="toast">✅ Ссылка скопирована!</div>

    <script>
        // Анимация листьев
        function createLeaves() {
            const container = document.getElementById('bgAnimation');
            const leaves = ['🌸', '🌸', '🌸', '🌸', '🌸', '🌸', '🌸'];
            for (let i = 0; i < 50; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.innerHTML = leaves[Math.floor(Math.random() * leaves.length)];
                leaf.style.left = Math.random() * 100 + '%';
                leaf.style.animationDuration = 5 + Math.random() * 12 + 's';
                leaf.style.animationDelay = Math.random() * 15 + 's';
                leaf.style.fontSize = 14 + Math.random() * 24 + 'px';
                leaf.style.opacity = 0.2 + Math.random() * 0.4;
                container.appendChild(leaf);
            }
        }
        createLeaves();

        // DOM элементы
        const urlInput = document.getElementById('urlInput');
        const processBtn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const thumbImg = document.getElementById('thumbImg');
        const titleText = document.getElementById('titleText');
        const metaText = document.getElementById('metaText');
        const qualitySelect = document.getElementById('qualitySelect');
        const downloadBtn = document.getElementById('downloadBtn');
        const linkInput = document.getElementById('linkInput');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        let currentUrl = '';
        let currentPlatform = '';

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function detectPlatform(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('instagram.com')) return 'instagram';
            if (url.includes('tiktok.com')) return 'tiktok';
            if (url.includes('twitter.com') || url.includes('x.com')) return 'twitter';
            if (url.includes('facebook.com')) return 'facebook';
            if (url.includes('vk.com')) return 'vk';
            return 'other';
        }

        function getDownloadUrl(url, platform, quality) {
            const videoId = extractVideoId(url, platform);
            
            const urls = {
                youtube: {
                    highest: `https://y2mate.nu/youtube/${videoId}/mp4/1080p`,
                    audio: `https://y2mate.nu/youtube/${videoId}/mp3/320`,
                    fallback: `https://yt5s.com/en33?url=${encodeURIComponent(url)}`
                },
                instagram: `https://snapinsta.app/download?url=${encodeURIComponent(url)}`,
                tiktok: `https://ssstik.io/dl?url=${encodeURIComponent(url)}`,
                twitter: `https://twdown.net/download.php?url=${encodeURIComponent(url)}`,
                facebook: `https://fdown.net/download?url=${encodeURIComponent(url)}`,
                vk: `https://vk-video-downloader.com/download?url=${encodeURIComponent(url)}`
            };
            
            if (platform === 'youtube') {
                if (quality === 'audio') return urls.youtube.audio;
                return urls.youtube.highest;
            }
            
            return urls[platform] || `https://cobalt.tools/api/json?url=${encodeURIComponent(url)}`;
        }

        function extractVideoId(url, platform) {
            if (platform === 'youtube') {
                const match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : '';
            }
            return '';
        }

        function getThumbnail(url, platform) {
            if (platform === 'youtube') {
                const id = extractVideoId(url, platform);
                return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
            }
            return `https://via.placeholder.com/140x140/ff69b4/ffffff?text=${platform.toUpperCase()}`;
        }

        function processVideo() {
            const url = urlInput.value.trim();
            if (!url) {
                showToast('🥷🏻 Вставь ссылку на видео, братишка!');
                return;
            }
            
            currentUrl = url;
            currentPlatform = detectPlatform(url);
            
            if (currentPlatform === 'other') {
                showToast('❌ Платформа не поддерживается! Попробуй YouTube, Instagram, TikTok');
                return;
            }
            
            loader.classList.add('show');
            resultCard.classList.remove('show');
            
            setTimeout(() => {
                const platformNames = {
                    youtube: 'YouTube',
                    instagram: 'Instagram',
                    tiktok: 'TikTok',
                    twitter: 'Twitter/X',
                    facebook: 'Facebook',
                    vk: 'VK'
                };
                
                thumbImg.src = getThumbnail(url, currentPlatform);
                titleText.textContent = `Видео с ${platformNames[currentPlatform]}`;
                metaText.innerHTML = `<i class="fab fa-${currentPlatform}"></i> ${platformNames[currentPlatform]} | 🎬 Доступно высокое качество | 🔓 Скачай сейчас`;
                
                loader.classList.remove('show');
                resultCard.classList.add('show');
            }, 600);
        }

        function downloadVideo() {
            if (!currentUrl) {
                showToast('Сначала вставь ссылку!');
                return;
            }
            
            const quality = qualitySelect.value;
            const downloadUrl = getDownloadUrl(currentUrl, currentPlatform, quality);
            
            linkInput.value = downloadUrl;
            window.open(downloadUrl, '_blank');
            showToast('📥 Ссылка получена! Скачивание началось...');
        }

        function copyLink() {
            if (!linkInput.value) {
                showToast('Сначала получи ссылку для скачивания!');
                return;
            }
            linkInput.select();
            document.execCommand('copy');
            showToast('✅ Ссылка скопирована!');
        }

        // Быстрая вставка ссылки из платформ
        document.querySelectorAll('.platform-badge').forEach(badge => {
            badge.addEventListener('click', () => {
                const exampleUrl = badge.dataset.url;
                if (exampleUrl) {
                    urlInput.value = exampleUrl;
                    urlInput.focus();
                    showToast(`📱 Вставь ссылку из ${badge.innerText}`);
                }
            });
        });

        processBtn.addEventListener('click', processVideo);
        downloadBtn.addEventListener('click', downloadVideo);
        copyBtn.addEventListener('click', copyLink);
        
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processVideo();
        });
    </script>
</body>
</html>
