<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SADIXLL FF STORE — Free Fire аккаунты и алмазы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-fire {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,69,0,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,100,0,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Хедер */
        .header {
            background: linear-gradient(135deg, rgba(255,69,0,0.9), rgba(255,100,0,0.8));
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
        }

        .logo p {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: white;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* Навигация */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #ff4500, #ff6400);
            box-shadow: 0 5px 15px rgba(255,69,0,0.3);
        }

        /* Карточки */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,69,0,0.3);
            transition: all 0.3s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ff4500;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .product-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: #ff4500;
            margin-bottom: 15px;
        }

        .product-price small {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .product-desc {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff4500, #ff6400);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,69,0,0.4);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 30px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #ff4500;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .modal h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,69,0,0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .modal button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4500, #ff6400);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #ff4500;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Корзина */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            z-index: 200;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
            border-left: 2px solid #ff4500;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .cart-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,69,0,0.3);
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4500;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 300;
            display: none;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<div class="bg-fire"></div>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-fire"></i> SADIXLL FF STORE</h1>
            <p>Free Fire аккаунты и алмазы | Таджикистан 🇹🇯</p>
        </div>
        <div class="user-info" id="userInfo">
            <i class="fas fa-user-circle"></i>
            <span id="userNameDisplay">Гость</span>
            <button class="logout-btn" id="logoutBtn" style="display: none;">Выйти</button>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="diamonds">💎 Алмазы</button>
        <button class="nav-tab" data-tab="accounts">🎮 Аккаунты</button>
        <button class="nav-tab" data-tab="panels">⚙️ Панели</button>
    </div>

    <div id="productsContainer" class="products-grid"></div>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Корзина</h3>
        <i class="fas fa-times" style="cursor: pointer;" id="closeCart"></i>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Итого: 0 TJS</div>
    <button class="buy-btn" id="checkoutBtn" style="margin-top: 15px;">✅ Оформить заказ</button>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <h3 id="modalTitle">🔐 Регистрация</h3>
        <div id="modalContent">
            <input type="email" id="emailInput" placeholder="Email адрес">
            <button id="sendCodeBtn">📧 Отправить код</button>
        </div>
    </div>
</div>

<div class="modal" id="codeModal">
    <div class="modal-content">
        <span class="modal-close" id="closeCodeModal">&times;</span>
        <h3>🔑 Подтверждение</h3>
        <div>
            <input type="text" id="codeInput" placeholder="6-значный код">
            <button id="verifyCodeBtn">✅ Подтвердить</button>
        </div>
    </div>
</div>

<div class="modal" id="registerModal">
    <div class="modal-content">
        <span class="modal-close" id="closeRegisterModal">&times;</span>
        <h3>📝 Завершение регистрации</h3>
        <div>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="completeRegisterBtn">✅ Зарегистрироваться</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Товары
    const products = {
        diamonds: [
            { id: 1, name: "100 Алмазов", price: 10, icon: "💎", desc: "+ Бонус 5 алмазов" },
            { id: 2, name: "500 Алмазов", price: 45, icon: "💎", desc: "+ Бонус 25 алмазов" },
            { id: 3, name: "1000 Алмазов", price: 85, icon: "💎", desc: "+ Бонус 100 алмазов" },
            { id: 4, name: "5000 Алмазов", price: 400, icon: "💎", desc: "+ Бонус 500 алмазов" },
            { id: 5, name: "10000 Алмазов", price: 750, icon: "💎", desc: "+ Бонус 1500 алмазов" }
        ],
        accounts: [
            { id: 6, name: "Аккаунт 30+ скинов", price: 150, icon: "🎮", desc: "30+ скинов, ранг Герой" },
            { id: 7, name: "Аккаунт 50+ скинов", price: 250, icon: "🎮", desc: "50+ скинов, элитные оружия" },
            { id: 8, name: "Аккаунт 100+ скинов", price: 500, icon: "🎮", desc: "100+ скинов, все персонажи" },
            { id: 9, name: "Аккаунт VIP", price: 1000, icon: "👑", desc: "200+ скинов, эксклюзив" }
        ],
        panels: [
            { id: 10, name: "Панель на 1 месяц", price: 200, icon: "⚙️", desc: "Доступ к админ панели" },
            { id: 11, name: "Панель на 3 месяца", price: 500, icon: "⚙️", desc: "Экономия 100 TJS" },
            { id: 12, name: "Панель на 6 месяцев", price: 900, icon: "⚙️", desc: "Экономия 300 TJS" },
            { id: 13, name: "Панель на 12 месяцев", price: 1500, icon: "⚙️", desc: "Лучшая цена" }
        ]
    };

    let currentUser = null;
    let pendingEmail = null;
    let pendingCode = null;
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let currentTab = 'diamonds';

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    function updateCartUI() {
        document.getElementById('cartCount').textContent = cart.length;
        localStorage.setItem('cart', JSON.stringify(cart));
        
        const cartItemsDiv = document.getElementById('cartItems');
        let total = 0;
        cartItemsDiv.innerHTML = '';
        
        cart.forEach((item, idx) => {
            total += item.price;
            cartItemsDiv.innerHTML += `
                <div class="cart-item">
                    <div>${item.icon} ${item.name}</div>
                    <div>${item.price} TJS <i class="fas fa-trash" style="color:#ff4500; cursor:pointer;" onclick="removeFromCart(${idx})"></i></div>
                </div>
            `;
        });
        
        document.getElementById('cartTotal').innerHTML = `Итого: ${total} TJS`;
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCartUI();
        showToast('🗑️ Товар удалён из корзины');
    }

    function addToCart(product) {
        if (!currentUser) {
            showToast('🔐 Сначала зарегистрируйтесь!');
            document.getElementById('authModal').classList.add('active');
            return;
        }
        cart.push(product);
        updateCartUI();
        showToast(`✅ ${product.name} добавлен в корзину!`);
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const currentProducts = products[currentTab];
        
        container.innerHTML = currentProducts.map(product => `
            <div class="product-card">
                <div class="product-icon">${product.icon}</div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.price} <small>TJS</small></div>
                <div class="product-desc">${product.desc}</div>
                <button class="buy-btn" onclick='addToCart(${JSON.stringify(product)})'>
                    🛒 В корзину
                </button>
            </div>
        `).join('');
    }

    // Регистрация через email
    function sendVerificationCode(email) {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingCode = code;
        pendingEmail = email;
        
        // Имитация отправки на почту (в реальном проекте тут API)
        console.log(`Код подтверждения для ${email}: ${code}`);
        showToast(`📧 Код отправлен на ${email} (тестовый: ${code})`);
        
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('codeModal').classList.add('active');
    }

    function verifyCode(code) {
        if (code === pendingCode) {
            document.getElementById('codeModal').classList.remove('active');
            document.getElementById('registerModal').classList.add('active');
        } else {
            showToast('❌ Неверный код! Попробуйте снова');
        }
    }

    function completeRegistration(username, password) {
        if (!username || !password) {
            showToast('❌ Заполните все поля!');
            return;
        }
        
        currentUser = {
            email: pendingEmail,
            username: username,
            password: password,
            registered: Date.now()
        };
        
        localStorage.setItem('ff_user', JSON.stringify(currentUser));
        document.getElementById('registerModal').classList.remove('active');
        document.getElementById('userNameDisplay').textContent = username;
        document.getElementById('logoutBtn').style.display = 'block';
        showToast(`🎉 Добро пожаловать, ${username}!`);
        pendingEmail = null;
        pendingCode = null;
    }

    function logout() {
        currentUser = null;
        cart = [];
        localStorage.removeItem('ff_user');
        localStorage.removeItem('cart');
        updateCartUI();
        document.getElementById('userNameDisplay').textContent = 'Гость';
        document.getElementById('logoutBtn').style.display = 'none';
        showToast('👋 Вы вышли из аккаунта');
    }

    function checkout() {
        if (!currentUser) {
            showToast('🔐 Сначала войдите в аккаунт!');
            document.getElementById('authModal').classList.add('active');
            return;
        }
        if (cart.length === 0) {
            showToast('🛒 Корзина пуста!');
            return;
        }
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        showToast(`✅ Заказ оформлен! Сумма: ${total} TJS. Свяжемся с вами в Telegram @Sadixll`);
        
        // Отправка на почту (имитация)
        console.log(`Заказ для ${currentUser.email}:`, cart);
        
        cart = [];
        updateCartUI();
        document.getElementById('cartSidebar').classList.remove('open');
    }

    // Инициализация
    function init() {
        const savedUser = localStorage.getItem('ff_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('userNameDisplay').textContent = currentUser.username;
            document.getElementById('logoutBtn').style.display = 'block';
        }
        
        updateCartUI();
        renderProducts();
        
        // Табы
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderProducts();
            });
        });
        
        // Корзина
        document.getElementById('cartIcon').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.add('open');
        });
        document.getElementById('closeCart').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.remove('open');
        });
        
        // Модалки
        document.getElementById('closeModal').onclick = () => document.getElementById('authModal').classList.remove('active');
        document.getElementById('closeCodeModal').onclick = () => document.getElementById('codeModal').classList.remove('active');
        document.getElementById('closeRegisterModal').onclick = () => document.getElementById('registerModal').classList.remove('active');
        
        document.getElementById('sendCodeBtn').onclick = () => {
            const email = document.getElementById('emailInput').value;
            if (email && email.includes('@')) {
                sendVerificationCode(email);
            } else {
                showToast('❌ Введите корректный email!');
            }
        };
        
        document.getElementById('verifyCodeBtn').onclick = () => {
            const code = document.getElementById('codeInput').value;
            verifyCode(code);
        };
        
        document.getElementById('completeRegisterBtn').onclick = () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            completeRegistration(username, password);
        };
        
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('checkoutBtn').onclick = checkout;
        
        // Авто-открытие регистрации для гостей
        if (!currentUser) {
            setTimeout(() => {
                document.getElementById('authModal').classList.add('active');
            }, 1000);
        }
    }
    
    init();
</script>
</body>
</html>
